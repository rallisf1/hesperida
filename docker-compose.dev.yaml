services:
  probe:
    restart: never
    profiles: [tools]
    build:
      context: ./
      dockerfile: ./probe/Dockerfile
    environment:
      - "SURREAL_USER=${SURREAL_USER:-root}"
      - "SURREAL_PASS=${SURREAL_PASS:?}"
      - "SURREAL_NAMESPACE=${SURREAL_NAMESPACE:-main}"
      - "SURREAL_DATABASE=${SURREAL_DATABASE:-main}"
      - "SURREAL_ADDRESS=${SURREAL_ADDRESS:-db:8000}"
      - "SURREAL_PROTOCOL=${SURREAL_PROTOCOL:-http}"
      - "DEBUG=${DEBUG:-false}"
      - "APPRISE_URL=${APPRISE_URL:-http://apprise:8000}"
      - "APPRISE_API_KEY=${APPRISE_API_KEY:-}"
      - "MAX_ATTEMPTS=${MAX_ATTEMPTS:-4}"
      - "WCAG_RUN_ONLY=${WCAG_RUN_ONLY:-}"
      - "WCAG_EXCLUDE_RULES=${WCAG_EXCLUDE_RULES:-}"
  
  whois:
    restart: never
    profiles: [tools]
    build:
      context: ./
      dockerfile: ./whois/Dockerfile
    environment:
      - "SURREAL_USER=${SURREAL_USER:-root}"
      - "SURREAL_PASS=${SURREAL_PASS:?}"
      - "SURREAL_NAMESPACE=${SURREAL_NAMESPACE:-main}"
      - "SURREAL_DATABASE=${SURREAL_DATABASE:-main}"
      - "SURREAL_ADDRESS=${SURREAL_ADDRESS:-db:8000}"
      - "SURREAL_PROTOCOL=${SURREAL_PROTOCOL:-http}"
      - "DEBUG=${DEBUG:-false}"

  ssl:
    restart: never
    profiles: [tools]
    build:
      context: ./
      dockerfile: ./ssl/Dockerfile
    environment:
      - "NODE_ENV=${NODE_ENV:-production}"
      - "SURREAL_USER=${SURREAL_USER:-root}"
      - "SURREAL_PASS=${SURREAL_PASS:?}"
      - "SURREAL_NAMESPACE=${SURREAL_NAMESPACE:-main}"
      - "SURREAL_DATABASE=${SURREAL_DATABASE:-main}"
      - "SURREAL_ADDRESS=${SURREAL_ADDRESS:-db:8000}"
      - "SURREAL_PROTOCOL=${SURREAL_PROTOCOL:-http}"
      - "DEBUG=${DEBUG:-false}"

  domain:
    restart: never
    profiles: [tools]
    build:
      context: ./
      dockerfile: ./domain/Dockerfile
    environment:
      - "NODE_ENV=${NODE_ENV:-production}"
      - "SURREAL_USER=${SURREAL_USER:-root}"
      - "SURREAL_PASS=${SURREAL_PASS:?}"
      - "SURREAL_NAMESPACE=${SURREAL_NAMESPACE:-main}"
      - "SURREAL_DATABASE=${SURREAL_DATABASE:-main}"
      - "SURREAL_ADDRESS=${SURREAL_ADDRESS:-db:8000}"
      - "SURREAL_PROTOCOL=${SURREAL_PROTOCOL:-http}"
      - "DEBUG=${DEBUG:-false}"
    volumes:
      - ./data/rdap-cache.json:/rdap-cache.json:rw

  seo:
    restart: never
    profiles: [tools]
    build:
      context: ./
      dockerfile: ./seo/Dockerfile
    environment:
      - "NODE_ENV=${NODE_ENV:-production}"
      - "SURREAL_USER=${SURREAL_USER:-root}"
      - "SURREAL_PASS=${SURREAL_PASS:?}"
      - "SURREAL_NAMESPACE=${SURREAL_NAMESPACE:-main}"
      - "SURREAL_DATABASE=${SURREAL_DATABASE:-main}"
      - "SURREAL_ADDRESS=${SURREAL_ADDRESS:-db:8000}"
      - "SURREAL_PROTOCOL=${SURREAL_PROTOCOL:-http}"
      - "DEBUG=${DEBUG:-false}"

  wcag:
    restart: never
    profiles: [tools]
    build:
      context: ./
      dockerfile: ./wcag/Dockerfile
    ipc: host
    environment:
      - "NODE_ENV=${NODE_ENV:-production}"
      - "SURREAL_USER=${SURREAL_USER:-root}"
      - "SURREAL_PASS=${SURREAL_PASS:?}"
      - "SURREAL_NAMESPACE=${SURREAL_NAMESPACE:-main}"
      - "SURREAL_DATABASE=${SURREAL_DATABASE:-main}"
      - "SURREAL_ADDRESS=${SURREAL_ADDRESS:-db:8000}"
      - "SURREAL_PROTOCOL=${SURREAL_PROTOCOL:-http}"
      - "DEBUG=${DEBUG:-false}"

  security:
    restart: never
    profiles: [tools]
    build:
      context: ./
      dockerfile: ./security/Dockerfile
    environment:
      - "NODE_ENV=${NODE_ENV:-production}"
      - "SURREAL_USER=${SURREAL_USER:-root}"
      - "SURREAL_PASS=${SURREAL_PASS:?}"
      - "SURREAL_NAMESPACE=${SURREAL_NAMESPACE:-main}"
      - "SURREAL_DATABASE=${SURREAL_DATABASE:-main}"
      - "SURREAL_ADDRESS=${SURREAL_ADDRESS:-db:8000}"
      - "SURREAL_PROTOCOL=${SURREAL_PROTOCOL:-http}"
      - "DEBUG=${DEBUG:-false}"
      - "SECURITY_NUCLEI_TEMPLATES=${SECURITY_NUCLEI_TEMPLATES:-}"
      - "SECURITY_NIKTO_TIMEOUT=${SECURITY_NIKTO_TIMEOUT:-900}"
      - "SECURITY_SCORE_THRESHOLD=${SECURITY_SCORE_THRESHOLD:-400}"

  stress:
    restart: never
    profiles: [tools]
    build:
      context: ./
      dockerfile: ./stress/Dockerfile
    environment:
      - "SURREAL_USER=${SURREAL_USER:-root}"
      - "SURREAL_PASS=${SURREAL_PASS:?}"
      - "SURREAL_NAMESPACE=${SURREAL_NAMESPACE:-main}"
      - "SURREAL_DATABASE=${SURREAL_DATABASE:-main}"
      - "SURREAL_ADDRESS=${SURREAL_ADDRESS:-db:8000}"
      - "SURREAL_PROTOCOL=${SURREAL_PROTOCOL:-http}"
      - "DEBUG=${DEBUG:-false}"
      - "STRESS_RATE=${STRESS_RATE:-10}"
      - "STRESS_DURATION=${STRESS_DURATION:-30s}"
      - "STRESS_METHOD=${STRESS_METHOD:-GET}"
      - "STRESS_TIMEOUT=${STRESS_TIMEOUT:-10s}"
      - "STRESS_WORKERS=${STRESS_WORKERS:-10}"
      - "STRESS_MAX_WORKERS=${STRESS_MAX_WORKERS:-100}"
      - "STRESS_HEADERS=${STRESS_HEADERS:-{}}"
      - "STRESS_BODY=${STRESS_BODY:-}"
      - "STRESS_LATENCY_WARN_MS=${STRESS_LATENCY_WARN_MS:-500}"

  orchestrator:
    restart: always
    profiles: ["backend", "aio", "dev"]
#    command: ["--rebuild"] # comment this for not to rebuild the tool containers on every orchestrator start
    depends_on:
      db:
        condition: service_healthy
    build:
      context: ./
      dockerfile: ./orchestrator/Dockerfile
    environment:
      - "NODE_ENV=${NODE_ENV:-production}"
      - "SURREAL_USER=${SURREAL_USER:-root}"
      - "SURREAL_PASS=${SURREAL_PASS:?}"
      - "SURREAL_NAMESPACE=${SURREAL_NAMESPACE:-main}"
      - "SURREAL_DATABASE=${SURREAL_DATABASE:-main}"
      - "SURREAL_ADDRESS=${SURREAL_ADDRESS:-db:8000}"
      - "SURREAL_PROTOCOL=${SURREAL_PROTOCOL:-http}"
      - "APPRISE_URL=${APPRISE_URL:-http://apprise:8000}"
      - "APPRISE_API_KEY=${APPRISE_API_KEY:-}"
      - "DASHBOARD_URL=${DASHBOARD_URL:-http://localhost:3000}"
      - "DEBUG=${DEBUG:-false}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./domain:/tools/domain:ro
      - ./probe:/tools/probe:ro
      - ./seo:/tools/seo:ro
      - ./ssl:/tools/ssl:ro
      - ./wcag:/tools/wcag:ro
      - ./whois:/tools/whois:ro
      - ./security:/tools/security:ro
      - ./stress:/tools/stress:ro

  web:
    restart: always
    profiles: ["backend", "aio"]
    depends_on:
      db:
        condition: service_healthy
    build:
      context: ./
      dockerfile: ./web/Dockerfile
    environment:
      - "NODE_ENV=${NODE_ENV:-production}"
      - "SURREAL_USER=${SURREAL_USER:-root}"
      - "SURREAL_PASS=${SURREAL_PASS:?}"
      - "SURREAL_NAMESPACE=${SURREAL_NAMESPACE:-main}"
      - "SURREAL_DATABASE=${SURREAL_DATABASE:-main}"
      - "SURREAL_ADDRESS=${SURREAL_ADDRESS:-db:8000}"
      - "SURREAL_PROTOCOL=${SURREAL_PROTOCOL:-http}"
      - "APP_MODE=${APP_MODE:-both}"
      - "API_URL=${API_URL:-}"
      - "API_KEY=${API_KEY:-}"
      - "WEB_API_KEY=${WEB_API_KEY:-changeme}"
      - "APPRISE_URL=${APPRISE_URL:-http://apprise:8000}"
      - "APPRISE_API_KEY=${APPRISE_API_KEY:-}"
      - "WP_PATH=${APPRISE_API_KEY:-/app/wappalyzer.db}"
      - "NOTIFICATION_BRAND_LOGO_URL=${NOTIFICATION_BRAND_LOGO_URL:-https://example.com/logo.png}"
      - "DASHBOARD_URL=${DASHBOARD_URL:-http://localhost:3000}"
      - "SMTP_HOST=${SMTP_HOST:-}"
      - "SMTP_PORT=${SMTP_PORT:-587}"
      - "SMTP_USER=${SMTP_USER:-}"
      - "SMTP_PASS=${SMTP_PASS:-}"
      - "SMTP_SECURE=${SMTP_SECURE:-false}"
      - "SMTP_FROM=${SMTP_FROM:-}"
      - "SESSION_COOKIE_NAME=${SESSION_COOKIE_NAME:-hesperida_session}"
      - "SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}"
      - "SESSION_COOKIE_MAX_AGE=${SESSION_COOKIE_MAX_AGE:-3600}"
      - "GOTENBERG_URL=${GOTENBERG_URL:-http://pdf:3000}"
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    volumes:
      - ./data/wappalyzer/db.sqlite:/app/wappalyzer.db:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:3000/health >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  apprise:
    restart: always
    image: caronc/apprise:latest
    profiles: ["backend", "aio", "dev"]
    environment:
      - APPRISE_STATEFUL_MODE=disabled
      - APPRISE_API_ONLY=yes
      - APPRISE_WORKER_COUNT=${APPRISE_WORKER_COUNT:-1}
    ports:
      - "127.0.0.1:8001:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8000/status >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
  
  pdf:
    restart: always
    image: 'gotenberg/gotenberg:latest'
    profiles: ["backend", "aio", "dev"]
    ports:
      - "127.0.0.1:3001:3000"
    healthcheck:
      interval: 60s
      test:
        - CMD
        - curl
        - '-f'
        - 'http://gotenberg:3000/health'
      timeout: 10s

  db:
    restart: always
    image: surrealdb/surrealdb:latest
    profiles: ["database", "aio", "dev"]
    environment:
      - "SURREAL_USER=${SURREAL_USER:-root}"
      - "SURREAL_PASS=${SURREAL_PASS:?}"
      - "SURREAL_DEFAULT_NAMESPACE=${SURREAL_NAMESPACE:-main}"
      - "SURREAL_DEFAULT_DATABASE=${SURREAL_DATABASE:-main}"
      - SURREAL_CAPS_ALLOW_EXPERIMENTAL=files
      - SURREAL_BUCKET_FOLDER_ALLOWLIST=/mydata/screenshots
      - SURREAL_HIDE_WELCOME=true
      - SURREAL_NO_BANNER=true
      - SURREAL_PATH=rocksdb:/mydata/mydatabase.db
      - "TZ=${TZ:-Europe/Athens}"
      - "DEBUG=${DEBUG:-false}"
    command: start
    user: "1000"
    ports:
      - 127.0.0.1:8000:8000 # remove "127.0.0.1:" to make it publically available, not recommended; better use a reverse proxy
    volumes:
      - ./data:/mydata
    healthcheck:
        test: ["CMD", "/surreal", "is-ready"]
        interval: 5s
        timeout: 5s
        retries: 5
