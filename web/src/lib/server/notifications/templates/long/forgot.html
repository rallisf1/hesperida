<h2 style="margin: 0 0 12px; font-size: 22px; line-height: 1.25;">Password Reset Request</h2>
<p style="margin: 0 0 12px;">A password reset was requested for <strong>{{recipient_email}}</strong>.</p>
<p style="margin: 0 0 16px;">Use the following link to reset your password:</p>
<p style="margin: 0 0 16px;">
  <a href="{{public_dashboard_url}}/auth/reset?token={{forgot_token}}" style="display:inline-block;padding:10px 14px;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:6px;color:#111827;text-decoration:none;">
    {{public_dashboard_url}}/auth/reset?token={{forgot_token}}
  </a>
</p>
<p style="margin: 0;">If you did not request this, ignore this message.</p>
