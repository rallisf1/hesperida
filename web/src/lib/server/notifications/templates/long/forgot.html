<div style="font-family: Arial, sans-serif; line-height: 1.5; color: #111;">
  <div style="margin-bottom: 16px;">
    <img src="{{brand_logo_url}}" alt="{{app_name}}" style="max-height: 40px;" />
  </div>
  <h2 style="margin: 0 0 12px;">Password reset request</h2>
  <p>A password reset was requested for <strong>{{recipient_email}}</strong>.</p>
  <p>Use this reset token:</p>
  <pre style="padding: 12px; background: #f4f4f4; border-radius: 6px;">{{forgot_token}}</pre>
  <p>If you did not request this, ignore this message.</p>
  <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd;" />
  <p style="font-size: 12px; color: #666;">Sent via Hesperida</p>
</div>
