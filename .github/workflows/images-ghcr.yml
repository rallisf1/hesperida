name: Release Images to GHCR

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-images-release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha_short: ${{ steps.version.outputs.sha_short }}
      owner_lc: ${{ steps.version.outputs.owner_lc }}
      repo_lc: ${{ steps.version.outputs.repo_lc }}
      tmp_tag_prefix: ${{ steps.version.outputs.tmp_tag_prefix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./web/package.json').version")"
          SHA_SHORT="$(git rev-parse --short=12 HEAD)"
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO_LC="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          TMP_TAG_PREFIX="tmp-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "sha_short=${SHA_SHORT}" >> "${GITHUB_OUTPUT}"
          echo "owner_lc=${OWNER_LC}" >> "${GITHUB_OUTPUT}"
          echo "repo_lc=${REPO_LC}" >> "${GITHUB_OUTPUT}"
          echo "tmp_tag_prefix=${TMP_TAG_PREFIX}" >> "${GITHUB_OUTPUT}"

      - name: Validate git tag against package version
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_TAG="v${{ steps.version.outputs.version }}"
          ACTUAL_TAG="${GITHUB_REF_NAME}"
          if [[ "${ACTUAL_TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "::error::Tag/version mismatch. Expected ${EXPECTED_TAG} from web/package.json, got ${ACTUAL_TAG}."
            exit 1
          fi

  build_matrix:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        service: [probe, whois, ssl, domain, seo, wcag, security, stress, mail, orchestrator, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push staged multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ needs.prepare.outputs.owner_lc }}/${{ needs.prepare.outputs.repo_lc }}-${{ matrix.service }}:${{ needs.prepare.outputs.tmp_tag_prefix }}-${{ matrix.service }}
          cache-from: type=gha,scope=ghcr-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=ghcr-${{ matrix.service }}

  promote:
    runs-on: ubuntu-latest
    needs: [prepare, build_matrix]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote staged tags to release tags
        shell: bash
        env:
          OWNER_LC: ${{ needs.prepare.outputs.owner_lc }}
          REPO_LC: ${{ needs.prepare.outputs.repo_lc }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SHA_SHORT: ${{ needs.prepare.outputs.sha_short }}
          TMP_TAG_PREFIX: ${{ needs.prepare.outputs.tmp_tag_prefix }}
        run: |
          set -euo pipefail
          services=(probe whois ssl domain seo wcag security stress mail orchestrator web)

          for service in "${services[@]}"; do
            image="ghcr.io/${OWNER_LC}/${REPO_LC}-${service}"
            staged="${image}:${TMP_TAG_PREFIX}-${service}"

            echo "Promoting ${staged}"
            docker buildx imagetools create \
              --tag "${image}:${VERSION}" \
              --tag "${image}:sha-${SHA_SHORT}" \
              --tag "${image}:latest" \
              "${staged}"
          done
